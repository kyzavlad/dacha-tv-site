# ============================================================================
# Nginx site template — dachatv.com (Phase 1 self-hosting)
# ============================================================================
# STATUS: INACTIVE TEMPLATE. This file is committed for review only. It is
# NOT linked into /etc/nginx/sites-enabled and nothing in this repo enables
# it automatically. To activate (only after the app is deployed and verified
# healthy on 127.0.0.1:3030 — see deploy/self-host/README.md):
#
#   sudo cp deploy/self-host/nginx/dachatv.com.conf /etc/nginx/sites-available/dachatv.com.conf
#   sudo ln -s /etc/nginx/sites-available/dachatv.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t      # MUST pass before reloading
#   sudo systemctl reload nginx
#
# No TLS/certificate paths are referenced below — this template is HTTP-only
# on purpose, because no certificate exists yet on a server that has never
# served this domain. Get a cert (e.g. `sudo certbot --nginx -d dachatv.com
# -d www.dachatv.com`) AFTER this HTTP config is verified working end-to-end;
# certbot will then rewrite this file to add the 443 server block and the
# real cert paths itself. Do not hand-add ssl_certificate lines pointing at
# paths that do not exist — nginx -t will fail and the reload will be
# refused, which is the correct failure mode, but there's no reason to invite
# it before DNS has even moved (see README step 9).
#
# Port 3030 (upstream) is never exposed publicly: the app binds
# HOSTNAME=127.0.0.1 (see ecosystem.config.js), and this file only ever
# proxies to 127.0.0.1:3030 — do not open 3030 in ufw/security groups.
# ============================================================================

# Upstream name kept separate from the bare address so a future second
# instance (cluster mode) only requires editing this one block.
upstream dacha_tv_app {
  server 127.0.0.1:3030;
  keepalive 16;
}

server {
  listen 80;
  listen [::]:80;
  server_name dachatv.com www.dachatv.com;

  # Server Actions accept uploads up to 100MB (next.config.ts
  # experimental.serverActions.bodySizeLimit) — Nginx must allow the same
  # ceiling or it 413s the request before Next.js ever sees it.
  client_max_body_size 100m;

  # Default timeouts for ordinary storefront/API traffic. Overridden higher
  # below specifically for the bounded admin catalog/SEO batch endpoints,
  # which can legitimately run tens of seconds to a couple of minutes.
  proxy_connect_timeout 10s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  proxy_http_version 1.1;
  proxy_set_header Connection "";

  # ── Long-lived, content-hashed static assets ────────────────────────────
  # Next.js names files under /_next/static/ with a content hash, so the same
  # URL never changes meaning — safe to cache forever, immutably, at the
  # edge/browser. Everything else in this file intentionally sets NO
  # Cache-Control at the Nginx layer (no proxy_cache directive is configured
  # anywhere below either) — HTML, API responses, admin pages, and checkout
  # are never blindly cached here; Next.js's own response headers (or the
  # complete absence of caching for dynamic routes) are what govern them.
  location /_next/static/ {
    proxy_pass http://dacha_tv_app;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Required so proxy.ts can reconstruct the correct EXTERNAL origin for
    # browser-facing redirects (e.g. the /ru/admin, /en/api canonical
    # redirects) even though the app itself only ever sees the internal
    # 127.0.0.1:3030 connection from Nginx. Locale REWRITES no longer depend
    # on these at all — see INTERNAL_APP_ORIGIN in
    # deploy/self-host/README.md — but redirects and any absolute-URL
    # generation elsewhere in the app still do.
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Accept $http_accept;

    add_header Cache-Control "public, max-age=31536000, immutable" always;
  }

  # ── Bounded admin catalog/SEO/import operations ─────────────────────────
  # These can run considerably longer than a normal request (batch imports,
  # SEO generation, category repair) but are still bounded operations, not
  # unbounded streams — a generous but finite timeout, not "off".
  location ~ ^/api/admin/(cron|catalog|seo)/ {
    proxy_pass http://dacha_tv_app;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Required so proxy.ts can reconstruct the correct EXTERNAL origin for
    # browser-facing redirects (e.g. the /ru/admin, /en/api canonical
    # redirects) even though the app itself only ever sees the internal
    # 127.0.0.1:3030 connection from Nginx. Locale REWRITES no longer depend
    # on these at all — see INTERNAL_APP_ORIGIN in
    # deploy/self-host/README.md — but redirects and any absolute-URL
    # generation elsewhere in the app still do.
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Accept $http_accept;

    proxy_read_timeout 180s;
    proxy_send_timeout 180s;

    add_header Cache-Control "no-store" always;
  }

  # ── Everything else: storefront pages, remaining API routes, admin UI,
  # checkout, Server Actions ────────────────────────────────────────────────
  # No caching directives here — dynamic/authenticated/transactional content
  # must not be cached by Nginx. proxy_buffering stays ON (the platform
  # default) except where explicitly turned off below, which is correct for
  # ordinary request/response traffic; Next.js's React Server Component
  # streaming still works through a buffering proxy because the client reads
  # the response as it arrives over the single kept-alive connection — HTTP
  # chunked transfer (chunked_transfer_encoding, on by default) is what
  # actually carries the stream, not proxy_buffering. It is disabled here
  # anyway for extra responsiveness on RSC/streaming SSR payloads.
  location / {
    proxy_pass http://dacha_tv_app;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Required so proxy.ts can reconstruct the correct EXTERNAL origin for
    # browser-facing redirects (e.g. the /ru/admin, /en/api canonical
    # redirects) even though the app itself only ever sees the internal
    # 127.0.0.1:3030 connection from Nginx. Locale REWRITES no longer depend
    # on these at all — see INTERNAL_APP_ORIGIN in
    # deploy/self-host/README.md — but redirects and any absolute-URL
    # generation elsewhere in the app still do.
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Accept $http_accept;

    proxy_buffering off;
    chunked_transfer_encoding on;

    # Explicit, not just "absence of a cache header" — makes intent
    # unambiguous for anyone reading this file or a response with curl -I.
    add_header Cache-Control "no-store" always;
  }
}
